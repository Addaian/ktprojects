media: public/uploads

content:
  - name: projects
    label: Projects
    type: collection
    path: src/content/projects
    format: yaml-frontmatter
    filename: "{primary}.md"
    view:
      primary: title
      sort: order
      order: asc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Short Description
        type: string
        required: true
      - name: category
        label: Category
        type: select
        required: true
        default: Other
        options:
          values:
            - Backend
            - Frontend
            - Full-Stack
            - Distributed Systems
            - AI / ML
            - Mobile
            - Infrastructure
            - DevTools
            - Data
            - Other
      - name: startDate
        label: Start Date
        type: date
        required: true
      - name: endDate
        label: End Date (leave empty if in progress)
        type: date
      - name: languages
        label: Languages / Tech
        type: string
        list: true
      - name: github
        label: GitHub URL
        type: string
      - name: image
        label: Cover Image URL
        type: string
      - name: images
        label: Additional Image URLs
        type: string
        list: true
      - name: quotes
        label: Brother Quotes
        type: object
        list: true
        fields:
          - name: quote
            label: Quote
            type: text
          - name: author
            label: Author Name
            type: string
          - name: role
            label: Role on Project
            type: string
      - name: status
        label: Status
        type: select
        required: true
        default: Active
        options:
          values:
            - Active
            - Shipped
            - Archived
      - name: featured
        label: Featured
        type: boolean
        default: false
      - name: order
        label: Display Order
        type: number
        default: 0
      - name: body
        label: README
        type: rich-text
        options:
          format: markdown

  - name: members
    label: Members
    type: collection
    path: src/content/members
    format: yaml-frontmatter
    filename: "{primary}.md"
    view:
      primary: name
      sort: order
      order: asc
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: role
        label: Role
        type: string
        required: true
      - name: tier
        label: Tier
        type: select
        required: true
        default: Member
        options:
          values:
            - Lead
            - Member
            - Contributor
      - name: avatar
        label: Avatar URL
        type: string
      - name: specialization
        label: Specialization
        type: string
      - name: affiliation
        label: Affiliation
        type: string
      - name: joinDate
        label: Join Date (e.g. MAR 2023)
        type: string
      - name: status
        label: Status
        type: select
        default: Active Deployment
        options:
          values:
            - Active Deployment
            - On Sabbatical
            - Alumni
      - name: featured
        label: Featured on About Page
        type: boolean
        default: false
      - name: isPledge
        label: Is a Pledge (not yet a brother)
        type: boolean
        default: false
      - name: github
        label: GitHub URL
        type: string
      - name: linkedin
        label: LinkedIn URL
        type: string
      - name: website
        label: Personal Website URL
        type: string
      - name: skills
        label: Skills
        type: object
        list: true
        fields:
          - name: name
            label: Skill Name
            type: string
          - name: level
            label: Level (0-100)
            type: number
            options:
              min: 0
              max: 100
      - name: contributions
        label: Contributions (project slugs)
        type: string
        list: true
      - name: order
        label: Display Order
        type: number
        default: 0
      - name: body
        label: Bio
        type: rich-text
        options:
          format: markdown

  - name: pulse
    label: Pulse
    type: collection
    path: src/content/pulse
    format: yaml-frontmatter
    filename: "{primary}.md"
    view:
      primary: title
      sort: date
      order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
      - name: category
        label: Category
        type: select
        required: true
        options:
          values:
            - Release
            - Milestone
            - Announcement
            - Award
            - Patch
            - System
      - name: version
        label: Version (e.g. v2.4.0)
        type: string
      - name: image
        label: Image URL
        type: string
      - name: excerpt
        label: Excerpt (shown on the feed)
        type: string
      - name: order
        label: Display Order
        type: number
        default: 0
      - name: body
        label: Body
        type: rich-text
        options:
          format: markdown
